<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עריכת פרופיל</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
  background: linear-gradient(135deg, #f8f1e3, #f4e9d8);
  margin: 0;
  padding: 20px 15px;
  min-height: 100vh;
  color: #333;
  direction: rtl;
  text-align: right;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  background: white;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  overflow: hidden;
}

h2 {
  text-align: center;
  margin: 0;
  padding: 24px 20px 20px;
  font-size: 24px;
  color: #5c2f2f;
  border-bottom: 1px solid #f0e6d9;
  background: #fffaf0;
}

/* שדות */
#fields {
  padding: 10px 15px 20px;
}

.field {
  background: #fff;
  padding: 16px 18px;
  margin-bottom: 12px;
  border-radius: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  border: 1px solid #f0e6d9;
  transition: all 0.2s ease;
}

.field:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
}

.field span {
  font-size: 15.5px;
  color: #444;
  line-height: 1.5;
}

/* כפתור עריכה */
.edit-btn {
  background: #7a4343;
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  font-weight: 500;
}

.edit-btn:hover {
  background: #6b3a3a;
  transform: scale(1.05);
}

/* מסך עריכה */
.editor {
  display: none;
  padding: 25px 20px;
  background: white;
  flex-direction: column;
  gap: 18px;
}

#editTitle {
  font-size: 20px;
  color: #5c2f2f;
  margin: 0 0 10px 0;
  text-align: center;
}

input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid #e6d9c8;
  border-radius: 12px;
  font-size: 16px;
  transition: border 0.3s ease;
  outline: none;
}

input:focus {
  border-color: #7a4343;
  box-shadow: 0 0 0 3px rgba(122, 67, 67, 0.1);
}

/* כפתורים ראשיים */
.btn-main {
  background: #7a4343;
  color: white;
  border: none;
  padding: 14px;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 8px;
}

.btn-main:hover {
  background: #6b3a3a;
  transform: translateY(-1px);
}

.btn-main:active {
  transform: scale(0.98);
}

/* באנר אישור */
.banner {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}

.banner-box {
  background: white;
  padding: 28px 24px;
  border-radius: 18px;
  width: 90%;
  max-width: 340px;
  box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
  text-align: center;
}

.banner-box p {
  font-size: 16px;
  margin: 0 0 22px 0;
  line-height: 1.5;
  color: #333;
}

/* כפתורים בבאנר */
.banner-box button {
  width: 100%;
  padding: 13px;
  margin: 6px 0;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.banner-box button:first-of-type {
  background: #7a4343;
  color: white;
}

.banner-box button:last-of-type {
  background: #f0e6d9;
  color: #5c2f2f;
}

.banner-box button:hover {
  filter: brightness(1.05);
}

/* שיפורים קטנים נוספים */
h3, h2 {
  font-weight: 600;
}

@media (max-width: 480px) {
  .container {
    border-radius: 16px;
  }
  
  .field, .banner-box {
    border-radius: 14px;
  }
}

</style>
</head>

<body>

<div class="container">

  <h2>עריכת פרופיל</h2>

  <div id="fields"></div>

  <!-- מסך עריכה -->
  <div id="editor" class="editor">
    <h3 id="editTitle"></h3>
    <input id="editInput" type="text">
    <button class="btn-main" onclick="confirmEdit()">שמור שינוי</button>
    <button class="btn-main" onclick="cancelEdit()">ביטול</button>
  </div>

</div>

<!-- באנר אישור -->
<div id="confirmBanner" class="banner">
  <div class="banner-box">
    <p id="confirmText"></p>
    <button onclick="applyEdit()">אישור</button>
    <button onclick="closeBanner()">ביטול</button>
  </div>
</div>

<script>
const script = document.createElement("script");
script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";

script.onload = async () => {

  const supabaseClient = window.supabase.createClient(
    "https://gpdkkjvppcsyqcdfbfyd.supabase.co",
    "sb_publishable_f5nIFbWwsTLCroOegC8vmw_WTxoEeeA"
  );

  window.supabaseClient = supabaseClient;

  await loadProfile(); // 🔥 טוען נתונים אחרי שהספרייה מוכנה
};

document.head.appendChild(script);


// ================= GLOBALS =================
let currentUser;
let currentData = {};
let editingField = "";
let newValue = "";


// ================= LOAD PROFILE =================
async function loadProfile() {

  const { data: { user } } = await window.supabaseClient.auth.getUser();

  console.log("USER:", user);

  if (!user) {
    alert("אין משתמש מחובר");
    window.location.href = "index.html";
    return;
  }

  currentUser = user;

  const { data, error } = await window.supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  console.log("PROFILE DATA:", data);
  console.log("ERROR:", error);

  if (error) {
    alert("שגיאה בטעינת פרופיל");
    return;
  }

  if (!data) {
    alert("אין פרופיל! מעביר למילוי...");
    window.location.href = "infouser1.html";
    return;
  }

  currentData = data;
  renderFields();
}


// ================= RENDER =================
function renderFields() {
  const container = document.getElementById("fields");
  container.innerHTML = "";

  const fields = [
    { key: "first_name", label: "שם פרטי" },
    { key: "last_name", label: "שם משפחה" },
    { key: "age", label: "גיל" },
    { key: "height", label: "גובה" },
    { key: "origin", label: "מוצא" },
    { key: "religion", label: "דת" },
    { key: "phone", label: "טלפון" },
    { key: "about", label: "עליי" }
  ];

  fields.forEach(f => {
    container.innerHTML += `
      <div class="field">
        <span>${f.label}: ${currentData[f.key] || "-"}</span>
        <button class="edit-btn" onclick="startEdit('${f.key}','${f.label}')">עריכה</button>
      </div>
    `;
  });
}


// ================= START EDIT =================
function startEdit(field, label) {
  editingField = field;

  document.getElementById("fields").style.display = "none";
  document.getElementById("editor").style.display = "block";

  document.getElementById("editTitle").innerText = "עריכת " + label;
  document.getElementById("editInput").value = currentData[field] || "";
}


// ================= CANCEL =================
function cancelEdit() {
  document.getElementById("editor").style.display = "none";
  document.getElementById("fields").style.display = "block";
}


// ================= CONFIRM =================
function confirmEdit() {
  newValue = document.getElementById("editInput").value;

  document.getElementById("confirmText").innerText =
    `האם אתה בטוח שברצונך לשנות ל: "${newValue}"?`;

  document.getElementById("confirmBanner").style.display = "flex";
}


// ================= CLOSE =================
function closeBanner() {
  document.getElementById("confirmBanner").style.display = "none";
}


// ================= APPLY =================
async function applyEdit() {

  const { error } = await window.supabaseClient
    .from("profiles")
    .update({ [editingField]: newValue })
    .eq("id", currentUser.id);

  if (error) {
    alert("שגיאה בעדכון");
    console.log(error);
    return;
  }

  currentData[editingField] = newValue;

  closeBanner();
  cancelEdit();
  renderFields();
}
</script>

</body>
</html>
