<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרופיל</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f1ea;
}

/* קונטיינר */
.profile {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
}

/* תמונה ראשית */
.main-img {
  width: 100%;
  height: 300px;
  object-fit: cover;
  background: #ddd;
}

/* גלריה */
.gallery {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  overflow-x: auto;
}

.gallery img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid transparent;
}

.gallery img:hover {
  border-color: black;
}

/* טקסט */
.name {
  font-size: 26px;
  font-weight: bold;
  margin-top: 15px;
}

.meta {
  color: #666;
  margin-top: 5px;
}

.section {
  margin-top: 20px;
}

.label {
  font-weight: bold;
  margin-bottom: 5px;
}

.value {
  color: #333;
}
</style>
</head>

<body>

<div class="profile">

  <img id="mainImage" class="main-img">

  <div class="gallery" id="gallery"></div>

  <div class="name" id="name"></div>
  <div class="meta" id="meta"></div>

  <div class="section">
    <div class="label">מוצא</div>
    <div class="value" id="origin"></div>
  </div>

  <div class="section">
    <div class="label">גובה</div>
    <div class="value" id="height"></div>
  </div>

  <div class="section">
    <div class="label">רמה דתית</div>
    <div class="value" id="religion"></div>
  </div>

  <div class="section">
    <div class="label">קצת עליי</div>
    <div class="value" id="about"></div>
  </div>

  <div class="section">
    <div class="label">טלפון</div>
    <div class="value" id="phone"></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ------------------- חיבור לסופאבייס -------------------
const supabaseClient = supabase.createClient(
  "https://gpdkkjvppcsyqcdfbfyd.supabase.co",
  "sb_publishable_f5nIFbWwsTLCroOegC8vmw_WTxoEeeA"
);

// ------------------- קבלת ID -------------------
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

console.log("userId:", userId);

// אם אין ID → חזרה
if (!userId) {
  alert("אין מזהה פרופיל");
  window.location.href = "index.html";
}

// ------------------- טעינה -------------------
loadProfile();

async function loadProfile() {

  const { data, error } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .limit(1);

  if (error || !data || data.length === 0) {
    alert("לא נמצא פרופיל");
    return;
  }

  const user = data[0];

  // ------------------- טקסט -------------------
  document.getElementById("name").innerText =
    `${user.first_name || ""} ${user.last_name || ""} · ${user.age || ""}`;

  document.getElementById("meta").innerText =
    `${user.city || ""} · ${user.religion || ""}`;

  document.getElementById("origin").innerText = user.origin || "-";
  document.getElementById("height").innerText =
    user.height ? user.height + " ס״מ" : "-";
  document.getElementById("religion").innerText = user.religion || "-";
  document.getElementById("about").innerText = user.about || "-";
  document.getElementById("phone").innerText = user.phone || "-";

  // ------------------- תמונות -------------------
  const images = Array.isArray(user.images) ? user.images : [];

  const mainImage = document.getElementById("mainImage");

  if (images.length > 0) {
    mainImage.src = images[0];
  } else {
    mainImage.src = "https://via.placeholder.com/600x300?text=No+Image";
  }

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  images.forEach(img => {
    const image = document.createElement("img");
    image.src = img;

    image.onclick = () => {
      mainImage.src = img;
    };

    gallery.appendChild(image);
  });
}
</script>

</body>
</html>
