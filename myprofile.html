<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>הפרופיל שלי</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#1a0533,#6a4c85,#1a0533);
  min-height:100vh;
  padding:20px;
  color:white;
}

.topbar{
  max-width:420px;
  margin:auto;
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.topbar button{
  flex:1;
  border:none;
  padding:14px;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

.editBtn{
  background:#00bcd4;
  color:white;
}

.profilesBtn{
  background:#ffffff22;
  color:white;
}

.card{
  max-width:420px;
  margin:auto;
  background:#ffffff12;
  backdrop-filter:blur(8px);
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.photo{
  height:420px;
  position:relative;
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:auto 0 0 0;
  padding:20px;
  background:linear-gradient(to top,rgba(0,0,0,.9),transparent);
}

.name{
  font-size:28px;
  font-weight:bold;
}

.meta{
  opacity:.8;
  margin-top:5px;
}

.body{
  padding:18px;
}

.box{
  background:white;
  color:#222;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.small{
  background:white;
  color:#222;
  border-radius:16px;
  padding:12px;
}

.label{
  font-size:12px;
  color:#777;
  margin-bottom:4px;
}
</style>
</head>
<body>

<div class="topbar">
  <button class="editBtn" onclick="location.href='edituser.html'">עריכת הפרופיל</button>
  <button class="profilesBtn" onclick="location.href='profiles.html'">לפרופיילס</button>
</div>

<div class="card">

  <div class="photo">
    <img id="mainImage">
    <div class="overlay">
      <div class="name" id="name">טוען...</div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <div class="body">

    <div class="box" id="about">טוען...</div>

    <div class="grid">
      <div class="small">
        <div class="label">גובה</div>
        <div id="height"></div>
      </div>

      <div class="small">
        <div class="label">מוצא</div>
        <div id="origin"></div>
      </div>

      <div class="small">
        <div class="label">דת</div>
        <div id="religion"></div>
      </div>

      <div class="small">
        <div class="label">טלפון</div>
        <div id="phone"></div>
      </div>
    </div>

  </div>
</div>

<script>
const script = document.createElement("script");
script.src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";

script.onload = async ()=>{

const supabaseClient = window.supabase.createClient(
"https://gpdkkjvppcsyqcdfbfyd.supabase.co",
"sb_publishable_f5nIFbWwsTLCroOegC8vmw_WTxoEeeA"
);

window.supabaseClient = supabaseClient;

await loadMyProfile();

};

document.head.appendChild(script);



async function loadMyProfile(){

const { data:{ user } } = await window.supabaseClient.auth.getUser();

if(!user){
 alert("אין משתמש מחובר");
 location.href="index.html";
 return;
}

const { data,error } = await window.supabaseClient
.from("profiles")
.select("*")
.eq("id",user.id)
.maybeSingle();

if(error || !data){
 alert("לא נמצא פרופיל");
 location.href="infouser1.html";
 return;
}

showProfile(data);

}



function showProfile(user){

document.getElementById("name").innerText =
`${user.first_name || ""} ${user.last_name || ""} · ${user.age || ""}`;

document.getElementById("meta").innerText =
`${user.city || ""} ${user.religion ? "· "+user.religion : ""}`;

document.getElementById("about").innerText = user.about || "-";
document.getElementById("height").innerText = user.height ? user.height+" ס״מ" : "-";
document.getElementById("origin").innerText = user.origin || "-";
document.getElementById("religion").innerText = user.religion || "-";
document.getElementById("phone").innerText = user.phone || "-";

const imgs = Array.isArray(user.images) ? user.images : [];

document.getElementById("mainImage").src =
imgs.length ? imgs[0] : "https://via.placeholder.com/600x400?text=No+Image";

}
</script>

</body>
</html>
