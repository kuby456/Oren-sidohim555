<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>לב נאמן</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
    }

    /* סרגל עליון */
    .topbar {
      width: 100%;
      min-height: 95px;
      background: linear-gradient(135deg, #5c2e2e, #8b4a4a, #c08a6b);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
      display: flex;
      justify-content: left;
     
      
      
    }

    .topbar-top {
display: flex;
  align-items: center;
      
  
 
}

    .menu-btn {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 22px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
     position: absolute;
      left: 15px;
      outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
    }

   

    
    /* סרגל צד */
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 260px;
      height: 100%;
      background: #fffaf5;
      box-shadow: 3px 0 18px rgba(0,0,0,0.2);
      z-index: 2000;
      transition: left 0.3s ease;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .sidebar-title {
      font-size: 22px;
      color: #6f3d3d;
      font-weight: bold;
    }

    .close-btn {
      background: #6f3d3d;
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .sidebar a {
      text-decoration: none;
      color: #333;
      background: #f3e8df;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background: #e7d4c4;
    }

    /* שכבה כהה */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 1500;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    /* כרטיסים - אחד מתחת לשני */
    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin: 20px 0 0;
    }

    .card {
      background: white;
      border-radius: 0px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border: 1px solid #eee2d8;
      position: relative;
      
    }

    .card-img {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #d9b8a0, #f2dfcf, #cda98b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }

    

    .card-name {
      font-size: 22px;
      font-weight: bold;
      color: #4d2a2a;
      margin-bottom: 6px;
    }

    .card-meta {
      font-size: 14px;
      color: #6d6d6d;
      margin-bottom: 10px;
      
    }

    .card-text {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 14px;
      color: #333;
    }
  
    .btn {
      flex: 1;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-main {
      background: #7a4343;
      color: white;
    }

    .btn-light {
      background: #efe3d8;
      color: #5c3434;
    }
  
  .topbar-icons {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 0 12px;
}

.icon {
  width: 22px;
  height: 22px;
  fill: white;
  cursor: pointer;
  transition: 0.2s;
}

.icon:hover {
  transform: scale(1.15);
  opacity: 0.8;
}
  
  .saveBtn {
  font-size: 24px;
  cursor: pointer;
  color: #bbb;
  transition: 0.3s;
    position: absolute;
    left: 10px; top: 8px;
}

.saveBtn.active {
  color: red;
  transform: scale(1.2);
}
  
  .saveBtn {
  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

.saveBtn:focus {
  outline: none;
}

.saveBtn:active {
  outline: none;
}
  
  .google-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: 0.2s;
  margin: 0 15px 0;
}

.google-btn i {
  font-size: 22px;
  color: #db4437; /* אדום של גוגל */
}

.google-btn:hover {
  transform: scale(1.1);
}

.google-btn:active {
  transform: scale(0.95);
}
  
  .span654 {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
    text-align: center;
    position: absolute;
    right: 5px;
    top: 20px;
    outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

  .span6548{
    background: blue;
    border-radius: 2px;
    padding: 2px 6px;
    font-size: 10px;
    
    
  }

  </style>
</head>
<body>

  <!-- סרגל עליון -->
  <header class="topbar">
    <div class="topbar-top">
      <div class="span654">
     <button class="google-btn" onclick="signInWithGoogle()">
  <svg viewBox="0 0 48 48" width="24" height="24">
    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.6 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C33.5 6.5 29 4.5 24 4.5 12.9 4.5 4 13.4 4 24.5S12.9 44.5 24 44.5 44 35.6 44 24.5c0-1.3-.1-2.7-.4-4z"/>
    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16.2 18.9 13 24 13c3 0 5.7 1.1 7.8 3l5.7-5.7C33.5 6.5 29 4.5 24 4.5c-7.7 0-14.3 4.4-17.7 10.2z"/>
    <path fill="#4CAF50" d="M24 44.5c5.1 0 9.7-2 13.3-5.3l-6.1-5c-2.1 1.5-4.7 2.3-7.2 2.3-5.2 0-9.6-3.4-11.2-8l-6.5 5C9.6 40.1 16.3 44.5 24 44.5z"/>
    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.4 5.6-6.1 7.2l6.1 5c3.5-3.2 5.7-7.9 5.7-13.7 0-1.3-.1-2.7-.4-4z"/>
  </svg>
        
</button>
        <span class="span6548">כניסה</span>
     </div>
     
      <button class="menu-btn" onclick="openSidebar()">☰</button>

     

    
  </header>

  <!-- שכבה כהה -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- סרגל צד -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">לב נאמן</div>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>

   <a href="#">פרופיל אישי</a>
    <a href="#">ההתאמות שלי</a>
    <a href="#">הודעות (מנהלי האתר)</a>
    <a href="#">אודות</a>
    
  </aside>

   

  <!-- תוכן -->
  <main class="page">
    
    <div class="cards">
      <div class="card" >
        <div class="card-img">👤</div>
        <div class="card-body">
         <i class="saveBtn fa-regular fa-heart"></i>  
          <div style="position: absolute; left: 0; top: 20px; text-align: center; margin-left: 40px; ">
          <div class="card-name"> שרה · 24</div>
          <div class="card-meta">ירושלים · חרדית · שומרת שבת</div>
            </div>
        </div>
      </div>
    </div>
  </main>
    
    
    <script>
   
function loadSupabaseAndInit(callback) {
  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";

  script.onload = () => {
    const supabase = window.supabase.createClient(
      "https://gpdkkjvppcsyqcdfbfyd.supabase.co",
      "sb_publishable_f5nIFbWwsTLCroOegC8vmw_WTxoEeeA",
      {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      }
    );

    callback(supabase);
  };

  document.head.appendChild(script);
}

// שימוש

    function openSidebar() {
      document.getElementById("sidebar").classList.add("open");
      document.getElementById("overlay").classList.add("show");
    }

    function closeSidebar() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("overlay").classList.remove("show");
    }
  
  const hearts = document.querySelectorAll(".saveBtn");

hearts.forEach(heart => {
  heart.addEventListener("click", () => {
    heart.classList.toggle("active");

    // מחליף בין לב ריק למלא
    heart.classList.toggle("fa-regular");
    heart.classList.toggle("fa-solid");
  });
});
    
    document.querySelector(".page").addEventListener("click", (e) => {

  // אם לחצו על לב → לא מעביר דף
  if (e.target.closest(".saveBtn")) return;

  // אם לחצו על כרטיס
  const card = e.target.closest(".card");

  if (card) {
    const link = card.dataset.link;
    window.location.href = link;
  }

});
    
    async function signInWithGoogle() {
  await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: window.location.href,
      queryParams: {
        prompt: "select_account"
      }
    }
  });
}
    
    function showUser(user) {
  const container = document.querySelector(".span654");

  container.innerHTML = `
    <img src="${user.user_metadata.avatar_url}" 
         style="width:40px;height:40px;border-radius:50%">
    <span class="span6548">${user.user_metadata.full_name}</span>
  `;
}
    async function checkUser() {
  const { data } = await supabaseClient.auth.getUser();

  if (data.user) {
    showUser(data.user);
  }
}
    
    loadSupabaseAndInit(async (supabase) => {
  window.supabaseClient = supabase;

  // 🔥 זה מה שחסר לך
  await supabase.auth.getSession();

  const { data } = await supabase.auth.getUser();

  if (data.user) {
    showUser(data.user);
  }
});


  </script>

</body>
</html>
