<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>לב נאמן</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
    }

    /* סרגל עליון */
    .topbar {
      width: 100%;
      min-height: 95px;
      background: linear-gradient(135deg, #5c2e2e, #8b4a4a, #c08a6b);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
      display: flex;
      justify-content: left;
     
      
      
    }

    .topbar-top {
display: flex;
  align-items: center;
  
}


.page {
  margin: 20px;
}
    .menu-btn {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 22px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
     position: absolute;
      left: 15px;
      outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
    }

   

    
    /* סרגל צד */
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 260px;
      height: 100%;
      background: #fffaf5;
      box-shadow: 3px 0 18px rgba(0,0,0,0.2);
      z-index: 2000;
      transition: left 0.3s ease;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .sidebar-title {
      font-size: 22px;
      color: #6f3d3d;
      font-weight: bold;
    }

    .close-btn {
      background: #6f3d3d;
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .sidebar a {
      text-decoration: none;
      color: #333;
      background: #f3e8df;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background: #e7d4c4;
    }

  
  .google-btn {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  border: none;
  background: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  transition: 0.2s;
  margin: 0 15px 0;
}

.google-btn i {
  font-size: 22px;
  color: #db4437; /* אדום של גוגל */
}

.google-btn:hover {
  transform: scale(1.1);
}

.google-btn:active {
  transform: scale(0.95);
}
  
  .span654 {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
    text-align: center;
    position: absolute;
    right: 5px;
    top: 20px;
    outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

  .span6548{
    background: blue;
    border-radius: 2px;
    padding: 2px 6px;
    font-size: 10px;
  }
.profile-banner {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 3000;
}

.profile-banner.show {
  display: flex;
}

.banner-box {
  background: white;
  padding: 25px;
  border-radius: 16px;
  text-align: center;
  width: 90%;
  max-width: 320px;
}

 .banner-actions {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 50px;
}
  .profile-banner .banner-box {
  transform: scale(0.9);
  opacity: 0;
  transition: 0.2s;
}

.profile-banner.show .banner-box {
  transform: scale(1);
  opacity: 1;
}
.cards {
 display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card {
  position: relative;
  width: 150px;
  height: 300px;
  aspect-ratio: 3/4;
  border-radius: 24px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  transition: transform 0.3s ease;
 
}
.card:hover { transform: translateY(-4px) scale(1.01); }

/* תמונה */
.card-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.3s;
}

/* כפתורי ניווט תמונות */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 32px;
  height: 32px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(4px);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 20px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.3s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card:hover .nav-btn { opacity: 1; }
.nav-left { left: 8px; }
.nav-right { right: 8px; }

/* נקודות */
.dots {
  position: absolute;
  top: 12px;
  left: 0; right: 0;
  display: flex;
  justify-content: center;
  gap: 4px;
}
.dot {
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.5);
  transition: all 0.3s;
}
.dot.active { width: 24px; background: white; }
.dot.inactive { width: 8px; }

/* badge התאמה */
.match-badge {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(4px);
  border-radius: 999px;
  padding: 4px 10px;
  color: white;
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* גרדיאנט */
.gradient {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.05) 50%, transparent 100%);
  pointer-events: none;
}

/* מידע */
.card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px;
  color: white;
}
.name-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.name-row h3 { font-size: 22px; font-weight: 700; }
.age { font-size: 18px; opacity: 0.8; }
.verified {
  width: 20px; height: 20px;
  background: #e91e8c;
  border-radius: 50%;
  font-size: 11px;
  display: flex; align-items: center; justify-content: center;
}
.location { font-size: 13px; opacity: 0.7; margin-bottom: 12px; }

/* תגיות */
.tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.tag {
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(4px);
  border-radius: 999px;
  padding: 2px 10px;
}

/* כפתורי פעולה */
.actions {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 16px;
}
.btn-pass, .btn-like, .btn-star {
  border: none;
  cursor: pointer;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: transform 0.2s;
}
.btn-pass {
  width: 30px; 
  height: 30px;
  padding: 10px;
  background: rgba(255,255,255,0.2);
  color: white;
    font-size: 15px;
}
.btn-like {
width: 40px; 
  height: 40px;
    padding: 20px;
  background: linear-gradient(135deg, #e91e8c, #9c27b0);
  color: white;
  box-shadow: 0 8px 24px rgba(233,30,140,0.4);
}
.btn-star {
 width: 30px; 
  height: 30px;
    padding: 10px;
  background: rgba(255,255,255,0.2);
  color: #facc15;
    font-size: 15px;

}

.btn-pass:hover, .btn-like:hover, .btn-star:hover { transform: scale(1.1); }
.btn-like.liked { transform: scale(1.25); background: #e91e8c; }
.btn-pass.passed { background: #ef4444; transform: scale(1.1); }
  </style>
</head>
<body>

  <!-- סרגל עליון -->
  <header class="topbar">
    <div class="topbar-top">
      <div class="span654">
     <button class="google-btn" onclick="signInWithGoogle()">
  <svg viewBox="0 0 48 48" width="24" height="24">
    <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.6 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C33.5 6.5 29 4.5 24 4.5 12.9 4.5 4 13.4 4 24.5S12.9 44.5 24 44.5 44 35.6 44 24.5c0-1.3-.1-2.7-.4-4z"/>
    <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16.2 18.9 13 24 13c3 0 5.7 1.1 7.8 3l5.7-5.7C33.5 6.5 29 4.5 24 4.5c-7.7 0-14.3 4.4-17.7 10.2z"/>
    <path fill="#4CAF50" d="M24 44.5c5.1 0 9.7-2 13.3-5.3l-6.1-5c-2.1 1.5-4.7 2.3-7.2 2.3-5.2 0-9.6-3.4-11.2-8l-6.5 5C9.6 40.1 16.3 44.5 24 44.5z"/>
    <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.1-3.4 5.6-6.1 7.2l6.1 5c3.5-3.2 5.7-7.9 5.7-13.7 0-1.3-.1-2.7-.4-4z"/>
  </svg>
        
</button>
        <span class="span6548">כניסה</span>
     </div>
     
      <button class="menu-btn" onclick="openSidebar()">☰</button>

     

    
  </header>

  <!-- שכבה כהה -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- סרגל צד -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">לב נאמן</div>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>

<a href="myprofile.html">הפרופיל שלי</a>    <a href="#">ההתאמות שלי</a>
    <a href="#">הודעות (מנהלי האתר)</a>
    <a href="#">אודות</a>
    
  </aside>
  <!-- תוכן -->
  <main class="page">
      <div class="cards"></div>
  </main>
    
    <div id="profileBanner" class="profile-banner">
  <div class="banner-box">
    <h3>התחברת בהצלחה 🎉</h3>
    <p>כדי להופיע באתר, המשך למילוי פרטי הכרטיס</p>

    <div class="banner-actions">
      <button onclick="goToProfile()" class="btn-main">המשך למילוי</button>
      <button onclick="closeBanner()" class="btn-light">מאוחר יותר</button>
    </div>
  </div>
</div>
    <div id="userMenu" class="profile-banner">
  <div class="banner-box">
    <h3>מה תרצה לעשות?</h3>

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:15px;">
      <button onclick="goToProfile()" class="btn-main">עריכת פרופיל</button>
      <button onclick="logout()" class="btn-light">יציאה מהאתר</button>
      <button onclick="closeUserMenu()" class="btn-light">ביטול</button>
    </div>
  </div>
</div>


<script>
const script = document.createElement("script");
script.src = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2";

script.onload = async () => {

  const supabaseClient = window.supabase.createClient(
    "https://gpdkkjvppcsyqcdfbfyd.supabase.co",
    "sb_publishable_f5nIFbWwsTLCroOegC8vmw_WTxoEeeA"
  );

  window.supabaseClient = supabaseClient;

  const { data: { user } } = await supabaseClient.auth.getUser();

  if (user) {
  showUser(user);
  await checkProfile(user);
}

// 👇 תוסיף את זה
await loadUsers();
};

document.head.appendChild(script);


// שימוש

    function openSidebar() {
      document.getElementById("sidebar").classList.add("open");
      document.getElementById("overlay").classList.add("show");
    }

    function closeSidebar() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("overlay").classList.remove("show");
    }
  
    
    async function signInWithGoogle() {
  if (!window.supabaseClient) return;

  const { data: { user } } = await supabaseClient.auth.getUser();

  if (user) return; // כבר מחובר

  await supabaseClient.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://kuby456.github.io/Oren-sidohim555/",
      queryParams: {
        prompt: "select_account"
      }
    }
  });
}
    
   async function showUser(user) {
  const container = document.querySelector(".span654");

  const name = user.user_metadata.full_name || "משתמש";

  // שליפת פרופיל מהדאטהבייס
  const { data } = await window.supabaseClient
    .from("profiles")
    .select("images")
    .eq("id", user.id)
    .single();

  let profileImg = "";

  if (data && Array.isArray(data.images) && data.images[0]) {
    profileImg = `<img src="${data.images[0]}" 
      style="width:100%;height:100%;object-fit:cover;border-radius:50%">`;
  } else {
    profileImg = `<i class="fa-solid fa-user" style="color:#7a4343;font-size:20px;"></i>`;
  }

  container.innerHTML = `
    <div class="user-profile-btn" onclick="openUserMenu()"
      style="display:flex;flex-direction:column;align-items:center;cursor:pointer;">
      
      <div style="
        width:45px;
        height:45px;
        border-radius:50%;
        background:#fff;
        display:flex;
        align-items:center;
        justify-content:center;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        overflow:hidden;
      ">
        ${profileImg}
      </div>

      <span class="span6548">שלום ${name.split(" ")[0]}</span>
    </div>
  `;
}
    
    function showProfileBanner() {
  document.getElementById("profileBanner").classList.add("show");
}

function closeBanner() {
  document.getElementById("profileBanner").classList.remove("show");
}

async function goToProfile() {

  const user = (await window.supabaseClient.auth.getUser()).data.user;

  if (!user) return;

  const { data } = await window.supabaseClient
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .single();

  if (data) {
    // ✔ יש פרופיל → עריכה
    window.location.href = "edituser.html";
  } else {
    // ❌ אין פרופיל → מילוי ראשוני
    window.location.href = "infouser1.html";
  }
}
    
    async function checkProfile(user) {
  const { data, error } = await supabaseClient
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .single();

  if (error && error.code !== "PGRST116") {
    console.log("שגיאה:", error);
  }

  if (!data) {
  showProfileBanner();
}
}
    
    
    async function loadUsers() {

  const { data, error } = await supabaseClient
    .from("profiles")
    .select("*");

  if (error) {
    console.log(error);
    return;
  }

  const container = document.querySelector(".cards");
  container.innerHTML = "";

  data.forEach(user => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `

${
Array.isArray(user.images) && user.images[0]
? `<img class="card-img" src="${user.images[0]}">`
: `<div class="card-img">👤</div>`
}

<div class="dots">
<span class="dot active"></span>
<span class="dot inactive"></span>
</div>

<div class="match-badge">
<span>התאמה</span>
</div>

<div class="gradient"></div>

<div class="card-info">

<div class="name-row">
<h3>${user.first_name || ""}</h3>
<span class="age">${user.age || ""}</span>
</div>

<div class="location">
${user.city || ""}
</div>

<div class="tags">
<span class="tag">${user.religion || ""}</span>
<span class="tag">${user.eda || ""}</span>
<span class="tag">${user.status || ""}</span>
</div>

<div class="actions">
<button class="btn-pass">✕</button>
<button class="btn-like">♥</button>
<button class="btn-star">★</button>
</div>

</div>
`;
    // מעבר לפרופיל
    card.onclick = () => {
      window.location.href = `profiles1.html?id=${user.id}`;
    };

    container.appendChild(card);
  });
document.querySelectorAll(".saveBtn").forEach(heart => {
  heart.addEventListener("click", (e) => {
    e.stopPropagation();

    heart.classList.toggle("active");
    heart.classList.toggle("fa-regular");
    heart.classList.toggle("fa-solid");
  });
});
}
function openUserMenu() {
  document.getElementById("userMenu").classList.add("show");
}

function closeUserMenu() {
  document.getElementById("userMenu").classList.remove("show");
}

async function logout() {
  await window.supabaseClient.auth.signOut();
  location.reload();
}
  </script>

</body>
</html>
