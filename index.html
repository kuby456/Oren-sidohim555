<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>לב נאמן</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f1ea;
      color: #222;
    }

    /* סרגל עליון */
    .topbar {
      width: 100%;
      min-height: 95px;
      background: linear-gradient(135deg, #5c2e2e, #8b4a4a, #c08a6b);
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 3px 12px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .topbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 8px;
    }

    .menu-btn {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      font-size: 22px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      cursor: pointer;
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      text-align: center;
    }

    .brand h1 {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .brand span {
      font-size: 12px;
      opacity: 0.9;
    }

    .topbar-icons {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 0 12px 12px;
      flex-wrap: wrap;
    }

    .icon-pill {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }

    /* סרגל צד */
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 260px;
      height: 100%;
      background: #fffaf5;
      box-shadow: 3px 0 18px rgba(0,0,0,0.2);
      z-index: 2000;
      transition: left 0.3s ease;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .sidebar-title {
      font-size: 22px;
      color: #6f3d3d;
      font-weight: bold;
    }

    .close-btn {
      background: #6f3d3d;
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .sidebar a {
      text-decoration: none;
      color: #333;
      background: #f3e8df;
      padding: 12px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .sidebar a:hover {
      background: #e7d4c4;
    }

    /* שכבה כהה */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 1500;
      display: none;
    }

    .overlay.show {
      display: block;
    }

    /* תוכן */
    .page {
      padding: 18px 12px 30px;
      max-width: 700px;
      margin: auto;
    }

    .section-title {
      font-size: 22px;
      color: #5a3030;
      margin-bottom: 14px;
      font-weight: bold;
    }

    /* כרטיסים - אחד מתחת לשני */
    .cards {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border: 1px solid #eee2d8;
      position: relative;
      
    }

    .card-img {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #d9b8a0, #f2dfcf, #cda98b);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }

    

    .card-name {
      font-size: 22px;
      font-weight: bold;
      color: #4d2a2a;
      margin-bottom: 6px;
    }

    .card-meta {
      font-size: 14px;
      color: #6d6d6d;
      margin-bottom: 10px;
      
    }

    .card-text {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 14px;
      color: #333;
    }

   
    

   
    .btn {
      flex: 1;
      border: none;
      padding: 12px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-main {
      background: #7a4343;
      color: white;
    }

    .btn-light {
      background: #efe3d8;
      color: #5c3434;
    }
  .topbar-icons {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 0 12px;
}

.icon {
  width: 22px;
  height: 22px;
  fill: white;
  cursor: pointer;
  transition: 0.2s;
}

.icon:hover {
  transform: scale(1.15);
  opacity: 0.8;
}
  
  #saveBtn {
  font-size: 24px;
  cursor: pointer;
  color: #bbb;
  transition: 0.3s;
    position: absolute;
    left: 10px; top: 8px;
}

#saveBtn.active {
  color: red;
  transform: scale(1.2);
}
  
  #saveBtn {
  outline: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

#saveBtn:focus {
  outline: none;
}

#saveBtn:active {
  outline: none;
}
  </style>
</head>
<body>

  <!-- סרגל עליון -->
  <header class="topbar">
    <div class="topbar-top">
      <button class="menu-btn" onclick="openSidebar()">☰</button>

      <div class="brand">
        <h1>לב נאמן</h1>
        <span>היכרות בדרך מכובדת</span>
      </div>

      <button class="menu-btn">❤</button>
    </div>

    <div class="topbar-icons">
  <svg viewBox="0 0 24 24" class="icon"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.65-7 10-7 10z"/></svg>

  <svg viewBox="0 0 24 24" class="icon"><path d="M12 17.27L18.18 21 16.54 13.97 22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>

  <svg viewBox="0 0 24 24" class="icon"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

  <svg viewBox="0 0 24 24" class="icon"><path d="M12 8a4 4 0 1 0 0-8 4 4 0 0 0 0 8zm0 2c-4 0-8 2-8 6v2h16v-2c0-4-4-6-8-6z"/></svg>

  <svg viewBox="0 0 24 24" class="icon"><path d="M12 2C8 2 5 5 5 9c0 5 7 13 7 13s7-8 7-13c0-4-3-7-7-7z"/></svg>
</div>
  </header>

  <!-- שכבה כהה -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- סרגל צד -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">לב נאמן</div>
      <button class="close-btn" onclick="closeSidebar()">✕</button>
    </div>

    <a href="#">דף הבית</a>
    <a href="#">ההתאמות שלי</a>
    <a href="#">מועדפים</a>
    <a href="#">הודעות</a>
    <a href="#">פרופיל אישי</a>
    <a href="#">הגדרות</a>
  </aside>

  <!-- תוכן -->
  <main class="page">
    <div class="section-title">הצעות עבורך</div>

    <div class="cards">
      <div class="card">
        <div class="card-img">👤</div>
        <div class="card-body">
         <i id="saveBtn" class="fa-regular fa-heart"></i>   <div style="position: absolute; left: 0; top: 20px; text-align: center; margin-left: 40px; ">
          <div class="card-name"> שרה · 24</div>
          <div class="card-meta">ירושלים · חרדית · שומרת שבת</div>
            </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    function openSidebar() {
      document.getElementById("sidebar").classList.add("open");
      document.getElementById("overlay").classList.add("show");
    }

    function closeSidebar() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("overlay").classList.remove("show");
    }
  const heart = document.getElementById("saveBtn");

heart.addEventListener("click", () => {
  heart.classList.toggle("active");

  // מחליף בין לב ריק למלא
  heart.classList.toggle("fa-regular");
  heart.classList.toggle("fa-solid");
});
  </script>

</body>
</html>
