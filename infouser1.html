<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פרופיל</title>

<style>
body {
    font-family: 'Assistant', system-ui, sans-serif;
    background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    overflow: hidden;
}

/* כרטיס */
.profile {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 30px;
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    position: relative;
    height: 94vh; /* 🔥 חשוב */
    display: flex;
    flex-direction: column;
}

/* תמונה */
.main-img {
    width: 100%;
    height: 45%;
    object-fit: cover;
}

/* overlay */
.name-overlay {
    position: absolute;
    bottom: 55%;
    left: 0;
    right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.75));
    padding: 60px 24px 15px;
    color: white;
}

.name {
    font-size: 26px;
    font-weight: 700;
}

.meta {
    font-size: 15px;
    opacity: 0.9;
}

/* גלריה */
.gallery {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid #eee;
}

.gallery img {
    width: 60px;
    height: 60px;
    border-radius: 14px;
    object-fit: cover;
    flex-shrink: 0;
}

/* אזור מידע */
.info-container {
    flex: 1;
    overflow-y: auto; /* 🔥 זה מה שחסר לך */
    padding: 10px 0;
}

/* כרטיסי מידע */
.section {
    margin: 8px 12px;
    padding: 14px;
    border-radius: 16px;
    background: linear-gradient(145deg, #ffffff, #f3f3f3);
    box-shadow: 
      4px 4px 10px rgba(0,0,0,0.05),
      -4px -4px 10px rgba(255,255,255,0.7);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* כותרת */
.label {
    font-size: 14px;
    color: #777;
}

/* ערך */
.value {
    font-size: 16px;
    font-weight: 600;
    color: #222;
    max-width: 60%;
    text-align: right;
}

/* טקסט ארוך */
#about {
    font-size: 15px;
    line-height: 1.6;
    color: #444;
}

/* טלפון */
#phone {
    color: #7a4343;
    font-weight: bold;
}

/* גלילה יפה */
.info-container::-webkit-scrollbar {
    width: 6px;
}

.info-container::-webkit-scrollbar-thumb {
    background: #cbb8a6;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="profile">

  <!-- תמונה ראשית -->
  <img id="mainImage" class="main-img">

  <!-- שכבת שם + meta על התמונה (יותר יפה!) -->
  <div class="name-overlay">
    <div class="name" id="name"></div>
    <div class="meta" id="meta"></div>
  </div>

  <!-- גלריה -->
  <div class="gallery" id="gallery"></div>

  <!-- איזור המידע – הכל מול העין -->
  <div class="info-container">

    <div class="section">
      <div class="label">מוצא</div>
      <div class="value" id="origin"></div>
    </div>

    <div class="section">
      <div class="label">גובה</div>
      <div class="value" id="height"></div>
    </div>

    <div class="section">
      <div class="label">רמה דתית</div>
      <div class="value" id="religion"></div>
    </div>

    <div class="section">
      <div class="label">קצת עליי</div>
      <div class="value" id="about"></div>
    </div>

    <div class="section">
      <div class="label">טלפון</div>
      <div class="value" id="phone"></div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ------------------- חיבור לסופאבייס -------------------
const supabaseClient = supabase.createClient(
  "https://gpdkkjvppcsyqcdfbfyd.supabase.co",
  "sb_publishable_f5nIFbWwsTLCroOegC8vmw_WTxoEeeA"
);

// ------------------- קבלת ID -------------------
const params = new URLSearchParams(window.location.search);
const userId = params.get("id");

if (!userId) {
  alert("אין מזהה פרופיל");
  window.location.href = "index.html";
}

// ------------------- טעינה -------------------
loadProfile();

async function loadProfile() {
  const { data, error } = await supabaseClient
    .from("profiles")
    .select("*")
    .eq("id", userId)
    .limit(1);

  if (error || !data || data.length === 0) {
    alert("לא נמצא פרופיל");
    return;
  }

  const user = data[0];

  // טקסטים
  document.getElementById("name").innerText = 
    `${user.first_name || ""} ${user.last_name || ""} · ${user.age || ""}`;

  document.getElementById("meta").innerText = 
    `${user.city || ""} · ${user.religion || ""}`;

  document.getElementById("origin").innerText = user.origin || "-";
  document.getElementById("height").innerText = 
    user.height ? user.height + " ס״מ" : "-";
  document.getElementById("religion").innerText = user.religion || "-";
  document.getElementById("about").innerText = user.about || "-";
  document.getElementById("phone").innerText = user.phone || "-";

  // תמונות
  const images = Array.isArray(user.images) ? user.images : [];
  const mainImage = document.getElementById("mainImage");

  if (images.length > 0) {
    mainImage.src = images[0];
  } else {
    mainImage.src = "https://via.placeholder.com/600x800?text=No+Image";
  }

  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  images.forEach((img, index) => {
    const image = document.createElement("img");
    image.src = img;
    image.onclick = () => { mainImage.src = img; };
    gallery.appendChild(image);
  });
}
</script>

</body>
</html>
